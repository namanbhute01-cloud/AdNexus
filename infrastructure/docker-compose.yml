services:
  postgres:
    image: postgres:15
    container_name: adnexus-postgres
    environment:
      POSTGRES_DB: adnexus
      POSTGRES_USER: adnexus
      POSTGRES_PASSWORD: dev_password
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adnexus"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: adnexus-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  mqtt:
    image: hivemq/hivemq4
    container_name: adnexus-mqtt
    ports:
      - "1883:1883"
      - "8883:8883"
      - "8080:8080"

  api:
    build:
      context: ../apps/api
    container_name: adnexus-api
    environment:
      DATABASE_URL: postgresql://adnexus:dev_password@postgres:5432/adnexus
      REDIS_URL: redis://redis:6379
      MQTT_BROKER_URL: mqtt://mqtt:1883
      JWT_SECRET: dev_secret_change_in_prod
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mqtt:
        condition: service_started

volumes:
  postgres_data:
